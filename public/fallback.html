<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf7f2" />
    <title>Luna — Sem conexão</title>
    <style>
      :root {
        --bg: #faf7f2;
        --fg: #3d2b28;
        --muted: #8c7b75;
        --primary: #c17b6e;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1614;
          --fg: #f3ece7;
          --muted: #a89e99;
          --primary: #e09a8b;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        text-align: center;
      }
      .card {
        max-width: 22rem;
      }
      .moon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.5rem;
        color: var(--primary);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1.75rem;
        line-height: 1.6;
        color: var(--muted);
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.75rem 1.5rem;
        font: inherit;
        font-weight: 500;
        color: #fff;
        background: var(--primary);
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg>
      <h1>Você está offline</h1>
      <p>Não foi possível carregar o Luna. Verifique sua conexão com a internet e tente novamente.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
